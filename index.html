<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>School Bank | Cloud System</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: { 
                        'spring': 'spring 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)', 
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-in'
                    },
                    keyframes: {
                        spring: { '0%': { transform: 'scale(0.9) translateY(10px)', opacity: '0' }, '100%': { transform: 'scale(1) translateY(0)', opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior-y: contain; user-select: none; }
        .glass { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.7); }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(244, 114, 182, 0.15) 0px, transparent 50%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .receipt-paper {
            background: white;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-mesh text-slate-900 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = { databaseURL: "https://schoolbank-27aa4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const { useState, useEffect, useMemo } = React;

        const VOUCHERS = { 'EXTRA5': 5.00, 'A+WORK': 10.00, 'BEHAVE': 2.00, 'CLEANUP': 3.00 };

        const Icon = ({ name, size = 20 }) => {
            const icons = {
                send: <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="none" stroke="currentColor" strokeWidth="2.5"/>,
                lock: <path d="M7 11V7a5 5 0 0 1 10 0v4M3 11h18v11H3z" fill="none" stroke="currentColor" strokeWidth="2.5"/>,
                trophy: <path d="M8 21h8M12 17v4M7 4h10M17 4v8a5 5 0 0 1-10 0V4" fill="none" stroke="currentColor" strokeWidth="2.5"/>,
                bank: <path d="M3 21h18M3 10h18M5 10v11M19 10v11M12 10v11M12 3l9 7H3l9-7z" fill="none" stroke="currentColor" strokeWidth="2"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 1 0-8 4 4 0 0 1 0 8z M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" strokeWidth="2"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" strokeWidth="2"/>,
                settings: <path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" strokeWidth="2"/>,
                check: <path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" className="inline-block" fill="none" strokeLinecap="round" strokeLinejoin="round">{icons[name]}</svg>;
        };

        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('sb_user')));
            const [profiles, setProfiles] = useState({});
            const [groups, setGroups] = useState({});
            const [activeId, setActiveId] = useState(localStorage.getItem('sb_active_id'));
            const [modal, setModal] = useState(null); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('students');
            const [economy, setEconomy] = useState({ taxRate: 0, loanLimit: 20 });
            
            const [notifications, setNotifications] = useState([]);
            const [selectedReceipt, setSelectedReceipt] = useState(null);

            useEffect(() => {
                const pRef = db.ref('profiles');
                pRef.on('value', (snap) => setProfiles(snap.val() || {}));

                const gRef = db.ref('groups');
                gRef.on('value', (snap) => setGroups(snap.val() || {}));

                const eRef = db.ref('economy');
                eRef.on('value', (snap) => {
                    if (snap.val()) setEconomy(snap.val());
                });

                return () => { pRef.off(); eRef.off(); gRef.off(); };
            }, [activeId]);

            const activeProfile = profiles[activeId];

            const leaderboard = useMemo(() => {
                return Object.values(profiles)
                    .sort((a, b) => b.balance - a.balance)
                    .slice(0, 5);
            }, [profiles]);

            const addNotification = (msg) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, msg }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 3000);
            };

            const handleDeleteUser = (pid, name) => {
                if (confirm(`Are you absolutely sure you want to delete ${name}'s account? This cannot be undone.`)) {
                    db.ref(`profiles/${pid}`).remove();
                    addNotification("Account deleted.");
                }
            };

            const handleTransfer = (e) => {
                e.preventDefault();
                const toId = e.target.toId.value;
                const amt = parseFloat(e.target.amount.value);
                if (!profiles[toId] || toId === activeId || amt > activeProfile.balance) return alert("Invalid Transfer");

                db.ref(`profiles/${activeId}`).update({ balance: activeProfile.balance - amt });
                db.ref(`profiles/${toId}`).update({ balance: profiles[toId].balance + amt });
                db.ref(`profiles/${activeId}/history`).push({ msg: `Sent to ${profiles[toId].name}`, amt: -amt, ts: Date.now() });
                db.ref(`profiles/${toId}/history`).push({ msg: `Received from ${activeProfile.name}`, amt: amt, ts: Date.now() });
                
                addNotification(`Sent $${amt.toFixed(2)} to ${profiles[toId].name}`);
                setModal(null);
                confetti();
            };

            const toggleAnonymous = () => {
                db.ref(`profiles/${activeId}`).update({ isAnonymous: !activeProfile.isAnonymous });
                addNotification(activeProfile.isAnonymous ? "Profile is now PUBLIC" : "Profile is now HIDDEN");
            };

            const handleCreateGroup = () => {
                const groupName = prompt("Enter Group Name:");
                if (!groupName) return;
                const gid = 'GRP-' + Math.floor(1000 + Math.random() * 9000);
                db.ref(`groups/${gid}`).set({ id: gid, name: groupName, balance: 0, members: [activeId] });
                addNotification(`Group Created! ID: ${gid}`);
            };

            const handleJoinGroup = () => {
                const gid = prompt("Enter Group ID (e.g., GRP-1234):")?.toUpperCase();
                if (!gid || !groups[gid]) return alert("Group not found!");
                const members = groups[gid].members || [];
                if (members.includes(activeId)) return alert("Already in group!");
                db.ref(`groups/${gid}`).update({ members: [...members, activeId] });
                addNotification(`Joined ${groups[gid].name}!`);
            };

            const handleDeleteGroup = (gid, name) => {
                if (confirm(`Delete the group "${name}"?`)) {
                    db.ref(`groups/${gid}`).remove();
                    addNotification("Group deleted.");
                }
            };

            const handleGroupTransaction = (gid, type) => {
                const amt = parseFloat(prompt(`Enter amount to ${type}:`));
                if (isNaN(amt) || amt <= 0) return;
                const currentGrpBal = groups[gid].balance || 0;
                if (type === 'deposit') {
                    if (amt > activeProfile.balance) return alert("Insufficient funds");
                    db.ref(`profiles/${activeId}`).update({ balance: activeProfile.balance - amt });
                    db.ref(`groups/${gid}`).update({ balance: currentGrpBal + amt });
                    addNotification(`Deposited $${amt} to group`);
                } else {
                    if (amt > currentGrpBal) return alert("Insufficient group funds");
                    db.ref(`profiles/${activeId}`).update({ balance: activeProfile.balance + amt });
                    db.ref(`groups/${gid}`).update({ balance: currentGrpBal - amt });
                    addNotification(`Withdrew $${amt} from group`);
                }
            };

            const handleRedeem = (e) => {
                e.preventDefault();
                const code = e.target.code.value.toUpperCase();
                const used = activeProfile.usedCodes || [];
                if (used.includes(code)) return alert("Code already used!");
                if (VOUCHERS[code]) {
                    db.ref(`profiles/${activeId}`).update({ balance: activeProfile.balance + VOUCHERS[code], usedCodes: [...used, code] });
                    db.ref(`profiles/${activeId}/history`).push({ msg: `Redeemed: ${code} 🎟️`, amt: VOUCHERS[code], ts: Date.now() });
                    addNotification(`Redeemed $${VOUCHERS[code].toFixed(2)}!`);
                    setModal(null);
                    confetti();
                } else { alert("Invalid Code"); }
            };

            const handleFine = (pid) => {
                const amt = parseFloat(prompt("Fine Amount:"));
                const reason = prompt("Reason:");
                if (!amt || !reason) return;
                db.ref(`profiles/${pid}`).update({ balance: profiles[pid].balance - amt });
                db.ref(`profiles/${pid}/history`).push({ msg: `Fine: ${reason} 👮`, amt: -amt, ts: Date.now() });
                addNotification(`Fine issued to ${profiles[pid].name}`);
            };

            const handleAdjustBalance = (pid) => {
                const newBal = parseFloat(prompt("New balance:", profiles[pid].balance));
                if (isNaN(newBal)) return;
                db.ref(`profiles/${pid}`).update({ balance: newBal });
                addNotification("Balance updated.");
            };

            const handleLoan = (e) => {
                e.preventDefault();
                const amt = parseFloat(e.target.amount.value);
                if (amt > economy.loanLimit) return alert(`Max loan is $${economy.loanLimit}`);
                db.ref(`profiles/${activeId}`).update({ balance: activeProfile.balance + amt });
                db.ref(`profiles/${activeId}/history`).push({ msg: `Bank Loan 🏦`, amt: amt, ts: Date.now() });
                addNotification(`Loan of $${amt} approved`);
                setModal(null);
            };

            if (!user) return (
                <div className="flex items-center justify-center min-h-screen p-6">
                    <form onSubmit={(e) => { e.preventDefault(); const u = { email: e.target.email.value }; setUser(u); localStorage.setItem('sb_user', JSON.stringify(u)); }} className="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-w-sm">
                        <h1 className="text-3xl font-black mb-8 text-indigo-600 italic">ClassBank</h1>
                        <input name="email" type="email" placeholder="School Email" className="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none" required />
                        <button className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black">GET STARTED</button>
                    </form>
                </div>
            );

            if (!activeId || !activeProfile) return (
                <div className="p-10 max-w-sm mx-auto">
                    <h2 className="text-2xl font-black mb-8">Choose Account</h2>
                    <div className="space-y-4">
                        {Object.values(profiles).filter(p => p.owner === user.email).map(p => (
                            <button key={p.id} onClick={() => { setActiveId(p.id); localStorage.setItem('sb_active_id', p.id); }} className="w-full p-6 bg-white rounded-3xl shadow-sm text-left font-bold">
                                {p.name} <span className="float-right text-indigo-600">${p.balance.toFixed(2)}</span>
                            </button>
                        ))}
                        <button onClick={() => {
                            const name = prompt("Enter Full Name:");
                            if (!name) return;
                            const id = Math.floor(1000 + Math.random() * 9000).toString();
                            db.ref('profiles/' + id).set({ id, name, balance: 10.00, owner: user.email, history: [{ msg: "Account Opened 🏦", amt: 10, ts: Date.now() }], isAnonymous: false });
                        }} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-3xl text-slate-400 font-bold italic">＋ Create New Account</button>
                    </div>
                    <button onClick={() => setModal('admin')} className="mt-20 opacity-20 block mx-auto"><Icon name="lock" size={16}/></button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-6 pb-32">
                    
                    <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] space-y-2 w-full max-w-[280px]">
                        {notifications.map(n => (
                            <div key={n.id} className="bg-slate-900 text-white text-[11px] font-bold py-3 px-6 rounded-2xl shadow-2xl animate-spring text-center flex items-center justify-center gap-2">
                                <span className="w-4 h-4 bg-emerald-400 text-slate-900 rounded-full flex items-center justify-center"><Icon name="check" size={10}/></span>
                                {n.msg}
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">ID: {activeId}</p>
                            <h2 className="text-xl font-black flex items-center gap-2">
                                {activeProfile.name}
                                <button onClick={toggleAnonymous} className={`text-[9px] px-2 py-1 rounded-full border transition-all ${activeProfile.isAnonymous ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-200'}`}>
                                    {activeProfile.isAnonymous ? 'INCOGNITO' : 'PUBLIC'}
                                </button>
                            </h2>
                        </div>
                        <button onClick={() => { setActiveId(null); localStorage.removeItem('sb_active_id'); }} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">Switch</button>
                    </div>

                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-2xl mb-8 relative overflow-hidden">
                        <p className="text-xs font-bold opacity-70 mb-1">Your Balance</p>
                        <h2 className="text-5xl font-black tracking-tighter mb-8">${activeProfile.balance.toFixed(2)}</h2>
                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => setModal('transfer')} className="py-4 bg-white text-indigo-600 rounded-2xl font-black text-xs shadow-lg uppercase">Send</button>
                            <button onClick={() => setModal('redeem')} className="py-4 bg-indigo-500 text-white rounded-2xl font-black text-xs border border-indigo-400 uppercase">Redeem</button>
                        </div>
                    </div>

                    <div className="mb-8">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <h3 className="font-black text-xs text-slate-400 uppercase flex items-center gap-2"><Icon name="users" size={12}/> Shared Groups</h3>
                            <div className="flex gap-2">
                                <button onClick={handleJoinGroup} className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg">JOIN</button>
                                <button onClick={handleCreateGroup} className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">+ NEW</button>
                            </div>
                        </div>
                        <div className="flex gap-4 overflow-x-auto no-scrollbar py-2">
                            {Object.values(groups).filter(g => g.members && g.members.includes(activeId)).map(g => (
                                <div key={g.id} className="flex-shrink-0 w-48 bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50 relative">
                                    {g.members[0] === activeId && (
                                        <button onClick={() => handleDeleteGroup(g.id, g.name)} className="absolute top-4 right-4 text-slate-300 hover:text-rose-500 transition-colors">
                                            <Icon name="trash" size={12}/>
                                        </button>
                                    )}
                                    <p className="font-bold text-sm mb-1 truncate pr-6">{g.name}</p>
                                    <p className="text-[8px] font-black text-slate-300 mb-2">ID: {g.id}</p>
                                    <p className="text-xl font-black mb-4">${(g.balance || 0).toFixed(2)}</p>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => handleGroupTransaction(g.id, 'deposit')} className="text-[9px] font-black py-2 bg-slate-50 rounded-xl">DEPOSIT</button>
                                        <button onClick={() => handleGroupTransaction(g.id, 'withdraw')} className="text-[9px] font-black py-2 bg-slate-50 rounded-xl">GET</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm mb-8">
                        <h3 className="font-black text-xs text-slate-400 uppercase mb-4">Recent Transactions</h3>
                        <div className="space-y-4">
                            {activeProfile.history ? Object.values(activeProfile.history).reverse().slice(0, 5).map((h, i) => (
                                <div key={i} onClick={() => setSelectedReceipt(h)} className="flex justify-between items-center cursor-pointer active:scale-95 transition-transform group">
                                    <div className="flex flex-col">
                                        <p className="font-bold text-sm group-hover:text-indigo-600 transition-colors">{h.msg}</p>
                                        <p className="text-[10px] text-slate-400">{new Date(h.ts).toLocaleDateString()} • Click for Receipt</p>
                                    </div>
                                    <span className={`font-black text-sm ${h.amt > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                        {h.amt > 0 ? '+' : ''}{h.amt.toFixed(2)}
                                    </span>
                                </div>
                            )) : <p className="text-xs text-slate-400 italic">No recent activity</p>}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm mb-8">
                        <h3 className="font-black text-xs text-slate-400 uppercase mb-4 flex items-center gap-2"><Icon name="trophy" size={12}/> Top Earners</h3>
                        <div className="space-y-4">
                            {leaderboard.map((p, i) => (
                                <div key={p.id} className="flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-black text-slate-300">#{i+1}</span>
                                        <span className="font-bold text-sm">{p.isAnonymous && p.id !== activeId ? '🕵️ Hidden Student' : (p.id === activeId ? `${p.name} (You)` : p.name)}</span>
                                    </div>
                                    <span className="font-black text-sm">${p.balance.toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedReceipt && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[110] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-8 shadow-2xl animate-spring text-center relative overflow-hidden receipt-paper">
                                <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                                <button onClick={() => setSelectedReceipt(null)} className="absolute top-4 right-6 text-slate-300 text-lg font-bold">✕</button>
                                
                                <div className="mt-4 mb-6">
                                    <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name="bank" size={28}/>
                                    </div>
                                    <h4 className="text-slate-400 font-black text-[10px] uppercase tracking-widest">Official Receipt</h4>
                                </div>

                                <div className="space-y-2 mb-8">
                                    <p className="text-slate-500 text-xs font-medium">{selectedReceipt.msg}</p>
                                    <h2 className="text-4xl font-black text-slate-900">${Math.abs(selectedReceipt.amt).toFixed(2)}</h2>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">{new Date(selectedReceipt.ts).toLocaleString()}</p>
                                </div>

                                <div className="border-t border-dashed border-slate-200 pt-6 space-y-3">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                                        <span>Status</span>
                                        <span className="text-emerald-500">Verified</span>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                                        <span>Transaction ID</span>
                                        <span>#{selectedReceipt.ts.toString().slice(-6)}</span>
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <div className="bg-indigo-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Stored in Cloud</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {modal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-[3rem] p-10 animate-slide-up relative">
                                <button onClick={() => setModal(null)} className="absolute top-6 right-8 text-slate-300 font-bold text-xl">✕</button>
                                
                                {modal === 'transfer' && (
                                    <form onSubmit={handleTransfer}>
                                        <input name="toId" placeholder="Recipient ID" className="w-full p-5 mb-4 bg-slate-100 rounded-2xl font-bold outline-none" required />
                                        <input name="amount" type="number" step="0.01" placeholder="$ 0.00" className="w-full p-6 mb-8 bg-slate-100 rounded-2xl text-4xl font-black text-center outline-none" required />
                                        <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase">Confirm Send</button>
                                    </form>
                                )}

                                {modal === 'redeem' && (
                                    <form onSubmit={handleRedeem}>
                                        <input name="code" placeholder="ENTER CODE" className="w-full p-5 mb-8 bg-slate-100 rounded-2xl font-black text-center outline-none" required />
                                        <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase">Claim Reward</button>
                                    </form>
                                )}

                                {modal === 'admin' && (
                                    <div className="max-h-[75vh] overflow-y-auto">
                                        {!isAdmin ? (
                                            <form onSubmit={(e) => { e.preventDefault(); if(e.target.pass.value === '1234') setIsAdmin(true); }}>
                                                <input name="pass" type="password" placeholder="Admin Password" className="w-full p-4 bg-slate-100 rounded-xl mb-4 font-bold" />
                                                <button className="w-full py-4 bg-black text-white rounded-xl font-black">Unlock</button>
                                            </form>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="flex gap-4 border-b pb-2">
                                                    <button onClick={() => setAdminTab('students')} className={`text-xs font-black ${adminTab === 'students' ? 'text-indigo-600' : 'text-slate-400'}`}>STUDENTS</button>
                                                    <button onClick={() => setAdminTab('economy')} className={`text-xs font-black ${adminTab === 'economy' ? 'text-indigo-600' : 'text-slate-400'}`}>ECONOMY</button>
                                                </div>
                                                {adminTab === 'students' ? (
                                                    <div className="space-y-3">
                                                        {Object.values(profiles).map(p => (
                                                            <div key={p.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                                                <div>
                                                                    <p className="font-bold text-sm">{p.name}</p>
                                                                    <p className="text-[10px] text-slate-400 font-bold">${p.balance.toFixed(2)}</p>
                                                                </div>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => handleAdjustBalance(p.id)} className="p-2 bg-slate-200 rounded-lg text-[10px] font-black">EDIT</button>
                                                                    <button onClick={() => handleFine(p.id)} className="p-2 bg-rose-100 text-rose-600 rounded-lg text-[10px] font-black">FINE</button>
                                                                    <button onClick={() => handleDeleteUser(p.id, p.name)} className="p-2 bg-rose-600 text-white rounded-lg shadow-sm">
                                                                        <Icon name="trash" size={14}/>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">Max Loan ($)</label>
                                                        <input type="number" value={economy.loanLimit} onChange={(e) => db.ref('economy').update({ loanLimit: parseFloat(e.target.value) })} className="w-full p-4 bg-slate-100 rounded-2xl font-bold mt-2" />
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
